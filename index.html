<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudentWork KG | Платформа</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="auth-screen" class="fixed inset-0 z-[100] bg-white flex items-center justify-center p-6">
        <div id="auth-box" class="max-w-md w-full space-y-6 text-center">
            <div class="w-20 h-20 bg-blue-600 rounded-3xl flex items-center justify-center mx-auto shadow-xl shadow-blue-200">
                <i class="fa-solid fa-graduation-cap text-white text-4xl"></i>
            </div>
            <h1 class="text-3xl font-black text-slate-800">StudentWork KG</h1>
            <p class="text-slate-500 font-medium">Студенттер үчүн эң коопсуз фриланс платформа</p>
            
            <div id="onboarding-steps" class="mt-8 space-y-4">
                <input id="user-name" type="text" placeholder="Атыңызды жазыңыз" class="w-full p-4 bg-slate-50 rounded-2xl border-none focus:ring-2 focus:ring-blue-500 outline-none">
                <button onclick="nextStep()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold text-lg hover:bg-blue-700 transition">Баштоо</button>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden">
        <nav class="fixed top-0 left-0 right-0 bg-white/80 backdrop-blur-md z-50 px-4 py-3 border-b border-slate-100">
            <div class="flex justify-between items-center max-w-lg mx-auto">
                <span class="font-black text-xl text-blue-600 italic">StudentWork</span>
                <div class="flex items-center space-x-3">
                    <i class="fa-regular fa-bell text-xl text-slate-400"></i>
                    <div id="top-avatar" class="w-9 h-9 bg-slate-800 rounded-full text-white flex items-center justify-center font-bold text-sm"></div>
                </div>
            </div>
        </nav>

        <main class="pt-20 pb-24 px-4 max-w-lg mx-auto">
            
            <section id="marketplace" class="page active">
                <div class="relative mb-6">
                    <i class="fa-solid fa-magnifying-glass absolute left-4 top-4 text-slate-400"></i>
                    <input type="text" placeholder="Адистерди же кызматтарды издөө..." class="w-full pl-12 pr-4 py-4 rounded-2xl bg-white shadow-sm border-none outline-none">
                </div>

                <h2 class="text-lg font-black mb-4">Сунушталган (AI Smart Feed)</h2>
                <div class="grid grid-cols-1 gap-4" id="marketplace-list">
                    </div>
            </section>

            <section id="post" class="page">
                <div class="bg-white p-6 rounded-[2.5rem] shadow-sm">
                    <h2 class="text-2xl font-black mb-6">Тапшырма жарыялоо</h2>
                    <div class="space-y-4">
                        <input type="text" placeholder="Эмне жасатуу керек?" class="w-full p-4 bg-slate-50 rounded-2xl border-none">
                        <select class="w-full p-4 bg-slate-50 rounded-2xl border-none text-slate-500">
                            <option>Дизайн</option>
                            <option>IT / Программалоо</option>
                            <option>SMM / Реклама</option>
                        </select>
                        <div class="grid grid-cols-2 gap-4">
                            <input type="number" placeholder="Бюджет" class="w-full p-4 bg-slate-50 rounded-2xl border-none">
                            <input type="text" placeholder="Мөөнөтү" class="w-full p-4 bg-slate-50 rounded-2xl border-none">
                        </div>
                        <button class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black mt-4">Жарыялоону түзүү</button>
                    </div>
                </div>
            </section>

            <section id="chat" class="page">
                <div class="bg-white rounded-[2rem] overflow-hidden flex flex-col h-[70vh] shadow-sm">
                    <div class="p-4 border-b flex items-center space-x-3">
                        <div class="w-10 h-10 bg-green-500 rounded-full flex items-center justify-center text-white font-bold">А</div>
                        <div>
                            <p class="font-black text-sm">Айбек (Verified)</p>
                            <p class="text-[10px] text-green-500 font-bold uppercase">Online • Жооп берүүсү тез</p>
                        </div>
                    </div>
                    <div id="chat-box" class="flex-1 p-4 space-y-4 overflow-y-auto bg-slate-50">
                        <div class="bg-white p-4 rounded-2xl rounded-tl-none shadow-sm max-w-[80%] text-sm">Саламатсызбы! Тапшырмаңызды көрдүм, 2 күндө бүтүрүп бере алам.</div>
                    </div>
                    <div class="p-4 bg-white border-t flex items-center space-x-2">
                        <input type="text" id="msg-input" placeholder="Жазуу..." class="flex-1 bg-slate-100 p-3 rounded-xl border-none outline-none">
                        <button onclick="sendMsg()" class="w-12 h-12 bg-blue-600 text-white rounded-xl"><i class="fa-solid fa-paper-plane"></i></button>
                    </div>
                </div>
            </section>

            <section id="profile" class="page">
                <div class="bg-white p-8 rounded-[3rem] text-center shadow-sm">
                    <div id="prof-img" class="w-24 h-24 bg-gradient-to-tr from-blue-600 to-cyan-400 rounded-full mx-auto flex items-center justify-center text-3xl text-white font-black shadow-lg mb-4"></div>
                    <h2 id="prof-name" class="text-2xl font-black"></h2>
                    <div class="flex justify-center space-x-2 mt-2">
                        <span class="bg-blue-100 text-blue-600 px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider italic">Verified</span>
                        <span class="bg-orange-100 text-orange-600 px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider italic">Pro</span>
                    </div>
                    <div class="grid grid-cols-3 gap-2 mt-8">
                        <div class="bg-slate-50 p-3 rounded-2xl"><p class="font-black">12</p><p class="text-[9px] text-slate-400 uppercase">Иштер</p></div>
                        <div class="bg-slate-50 p-3 rounded-2xl"><p class="font-black text-blue-600">4.9</p><p class="text-[9px] text-slate-400 uppercase">Рейтинг</p></div>
                        <div class="bg-slate-50 p-3 rounded-2xl"><p class="font-black text-green-500">100%</p><p class="text-[9px] text-slate-400 uppercase">Бүттү</p></div>
                    </div>
                    <button onclick="logout()" class="w-full mt-10 p-4 bg-red-50 text-red-500 font-bold rounded-2xl">Чыгуу</button>
                </div>
            </section>

        </main>

        <nav class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t border-slate-100 px-8 py-4 flex justify-between items-center z-50">
            <button onclick="showPage('marketplace')" class="nav-icon active"><i class="fa-solid fa-house-chimney text-xl"></i></button>
            <button onclick="showPage('post')" class="nav-icon"><i class="fa-solid fa-circle-plus text-3xl text-blue-600"></i></button>
            <button onclick="showPage('chat')" class="nav-icon"><i class="fa-solid fa-comment-dots text-xl"></i></button>
            <button onclick="showPage('profile')" class="nav-icon"><i class="fa-solid fa-user-astronaut text-xl"></i></button>
        </nav>
    </div>

    <script src="script.js"></script>
</body>
</html>
